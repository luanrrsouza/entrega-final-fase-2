<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            border-left: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen text-gray-800 flex flex-col items-center py-12 px-4">

    <div class="glass-panel w-full max-w-md rounded-2xl shadow-2xl p-8 transition-all duration-300">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-indigo-600 mb-2">
                <i class="fa-brands fa-aws mr-2"></i>Task Manager
            </h1>
            <p class="text-sm text-gray-500 font-medium">Rodando no EC2 + RDS PostgreSQL</p>
        </div>

        <form id="task-form" class="mb-6 flex gap-2">
            <input type="text" id="task-input" required placeholder="O que precisa ser feito?" 
                class="flex-1 px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all shadow-inner">
            <button type="submit" 
                class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-5 py-3 rounded-lg font-semibold shadow-lg hover:shadow-purple-500/50 hover:scale-105 transform transition-all active:scale-95">
                <i class="fa-solid fa-plus"></i>
            </button>
        </form>

        <div id="loading" class="text-center py-4 hidden">
            <i class="fa-solid fa-circle-notch fa-spin text-2xl text-purple-600"></i>
        </div>

        <div id="error-message" class="text-center py-2 text-red-500 font-semibold text-sm hidden"></div>

        <ul id="task-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
        </ul>
    </div>

    <script>
        const form = document.getElementById('task-form');
        const input = document.getElementById('task-input');
        const list = document.getElementById('task-list');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('error-message');

        const API_URL = '/api/tasks';

        async function loadTasks() {
            try {
                showLoading(true);
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Falha ao conectar na API');
                const tasks = await response.json();
                renderTasks(tasks);
            } catch (error) {
                showError("Erro ao carregar banco de dados. O RDS está configurado?");
                console.error(error);
            } finally {
                showLoading(false);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = input.value.trim();
            if (!title) return;

            try {
                input.disabled = true;
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                if (!response.ok) throw new Error('Falha ao criar tarefa');
                input.value = '';
                await loadTasks();
            } catch (error) {
                showError("Erro ao criar tarefa.");
            } finally {
                input.disabled = false;
                input.focus();
            }
        });

        async function toggleTask(id, completed) {
            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: !completed })
                });
                if (response.ok) await loadTasks();
            } catch (error) {
                showError("Erro ao atualizar tarefa.");
            }
        }

        async function deleteTask(id) {
            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (response.ok) await loadTasks();
            } catch (error) {
                showError("Erro ao excluir tarefa.");
            }
        }

        function renderTasks(tasks) {
            list.innerHTML = '';
            if (tasks.length === 0) {
                list.innerHTML = `<li class="text-center text-gray-400 py-4 text-sm font-medium">Nenhuma tarefa encontrada. Adicione uma!</li>`;
                return;
            }

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `group flex items-center justify-between p-4 rounded-xl bg-white shadow-sm border border-gray-100 hover:shadow-md transition-all ${task.completed ? 'opacity-70 bg-gray-50' : ''}`;
                
                li.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 overflow-hidden">
                        <button onclick="toggleTask(${task.id}, ${task.completed})" class="text-2xl transition-colors focus:outline-none ${task.completed ? 'text-green-500 hover:text-green-600' : 'text-gray-300 hover:text-purple-500'}">
                            <i class="fa-${task.completed ? 'solid' : 'regular'} fa-circle-check"></i>
                        </button>
                        <span class="font-medium truncate transition-all ${task.completed ? 'text-gray-400 line-through' : 'text-gray-700'}">
                            ${escapeHtml(task.title)}
                        </span>
                    </div>
                    <button onclick="deleteTask(${task.id})" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg opacity-0 group-hover:opacity-100 transition-all focus:outline-none">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;
                list.appendChild(li);
            });
        }

        function showLoading(show) {
            loading.classList.toggle('hidden', !show);
            if(show) {
                list.innerHTML = '';
                errorMessage.classList.add('hidden');
            }
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.remove('hidden');
            setTimeout(() => errorMessage.classList.add('hidden'), 5000);
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        loadTasks();
    </script>
</body>
</html>
